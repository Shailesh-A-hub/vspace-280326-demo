# Tiny Tapeout project information
project:
  title:        "Low-Power SpO2 Ratio Engine"
  author:       "Shreelakshmi SP-24bvd0219, Sanjay K 24BEC0506, SHAILESH A-24BEC0665"
  discord:      ""
  description:  "uW-class SpO2 signal processor for pulse oximetry"
  language:     "Verilog"
  clock_hz:     10000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_".
  top_module: "tt_um_shailesh_spo2_engine"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "SPI Data In"
  ui[1]: "SPI Clock In"
  ui[2]: "Channel Select (0=Red, 1=IR)"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "SpO2 Bit 0"
  uo[1]: "SpO2 Bit 1"
  uo[2]: "SpO2 Bit 2"
  uo[3]: "SpO2 Bit 3"
  uo[4]: "SpO2 Bit 4"
  uo[5]: "SpO2 Bit 5"
  uo[6]: "SpO2 Bit 6"
  uo[7]: "Valid Flag"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
